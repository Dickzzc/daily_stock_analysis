name: 美股人物动向监测

on:
  # 高频轮询。GitHub Actions 定时任务可能会有几分钟延迟。
  schedule:
    - cron: '*/30 * * * *'

  workflow_dispatch:
    inputs:
      lookback_hours:
        description: '新闻回看小时数'
        required: false
        default: '24'
      force_notify:
        description: '强制推送已命中过的最近项目'
        required: false
        default: false
        type: boolean
      dry_run:
        description: '只打印结果，不推送飞书'
        required: false
        default: false
        type: boolean

concurrency:
  group: person-stock-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装轻量依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests openai

      - name: 恢复监测去重状态
        uses: actions/cache/restore@v4
        with:
          path: .person-monitor-state
          key: person-monitor-state-${{ github.run_id }}
          restore-keys: |
            person-monitor-state-

      - name: 搜索人物动向并推送飞书
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL || 'gpt-4o-mini' }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          FEISHU_WEBHOOK_KEYWORD: ${{ vars.FEISHU_WEBHOOK_KEYWORD || secrets.FEISHU_WEBHOOK_KEYWORD }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          PERSON_MONITOR_LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || vars.PERSON_MONITOR_LOOKBACK_HOURS || '24' }}
          PERSON_MONITOR_MAX_ITEMS_PER_PERSON: ${{ vars.PERSON_MONITOR_MAX_ITEMS_PER_PERSON || '12' }}
          PERSON_MONITOR_MAX_NOTIFY_ITEMS: ${{ vars.PERSON_MONITOR_MAX_NOTIFY_ITEMS || '12' }}
          PERSON_MONITOR_FORCE_NOTIFY: ${{ github.event.inputs.force_notify || 'false' }}
          PERSON_MONITOR_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/person_stock_monitor.py

      - name: 保存监测去重状态
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .person-monitor-state
          key: person-monitor-state-${{ github.run_id }}
