name: US Stock Skill Lab

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "Space-separated US tickers. Leave empty to use STOCK_LIST monitor list."
        required: false
        default: ""
      period:
        description: "yfinance period"
        required: false
        default: "6mo"
      notify_feishu:
        description: "Send summary to Feishu"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      notify_mode:
        description: "Feishu notify mode"
        required: false
        default: "summary"
        type: choice
        options:
          - "summary"
          - "per_ticker"
  push:
    branches:
      - main
    paths:
      - "scripts/us_stock_skill_lab.py"
      - "tests/test_us_stock_skill_lab.py"
      - "docs/us-stock-skill-lab.md"
      - "docs/us_stock_skill_resources.json"
      - "requirements-stock-skills.txt"
      - ".github/workflows/us-stock-skill-lab.yml"
  pull_request:
    paths:
      - "scripts/us_stock_skill_lab.py"
      - "tests/test_us_stock_skill_lab.py"
      - "docs/us-stock-skill-lab.md"
      - "docs/us_stock_skill_resources.json"
      - "requirements-stock-skills.txt"
      - ".github/workflows/us-stock-skill-lab.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-stock-skills.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-stock-skills.txt

      - name: Run US stock skill lab
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          FEISHU_WEBHOOK_KEYWORD: ${{ vars.FEISHU_WEBHOOK_KEYWORD }}
          STOCK_LIST: ${{ vars.STOCK_LIST }}
        run: |
          TICKERS="${{ github.event.inputs.tickers }}"
          PERIOD="${{ github.event.inputs.period || '6mo' }}"
          NOTIFY="${{ github.event.inputs.notify_feishu || 'false' }}"
          MODE="${{ github.event.inputs.notify_mode || 'summary' }}"
          TICKER_ARGS=""
          if [ -n "$TICKERS" ]; then
            TICKER_ARGS="--tickers $TICKERS"
          fi
          if [ "$NOTIFY" = "true" ]; then
            if [ "$MODE" = "per_ticker" ]; then
              python scripts/us_stock_skill_lab.py $TICKER_ARGS --period "$PERIOD" --out artifacts/us_stock_skill_lab --notify-feishu --notify-per-ticker
            else
              python scripts/us_stock_skill_lab.py $TICKER_ARGS --period "$PERIOD" --out artifacts/us_stock_skill_lab --notify-feishu
            fi
          else
            python scripts/us_stock_skill_lab.py $TICKER_ARGS --period "$PERIOD" --out artifacts/us_stock_skill_lab
          fi

      - name: Run offline unit tests
        run: python -m unittest tests.test_us_stock_skill_lab

      - name: Upload US stock skill lab artifacts
        uses: actions/upload-artifact@v6
        with:
          name: us-stock-skill-lab
          path: artifacts/us_stock_skill_lab
